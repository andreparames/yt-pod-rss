name: Generate RSS Feed

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube channel URL (overrides config.yml)"
        required: false
        default: ""
      num_videos:
        description: "Number of videos"
        required: false
        default: "20"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "${{ inputs.url }}" ]; then
            python generate_feed.py "${{ inputs.url }}" -n "${{ inputs.num_videos }}" -o feed.xml
          else
            python generate_feed.py -n "${{ inputs.num_videos || '20' }}" -o feed.xml
          fi

      - name: Prepare Pages output
        run: |
          mkdir -p _site
          cp feed.xml _site/
          if [ -d media ]; then cp -r media _site/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
