name: Generate RSS Feed

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      url:
        description: "YouTube channel URL"
        required: false
        default: ""
      num_videos:
        description: "Number of videos"
        required: false
        default: "20"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        env:
          YT_CHANNEL_URL: ${{ secrets.YT_CHANNEL_URL || inputs.url }}
        run: |
          URL="${YT_CHANNEL_URL}"
          if [ -z "$URL" ]; then
            echo "Error: YT_CHANNEL_URL secret or workflow input not set"
            exit 1
          fi
          python generate_feed.py "$URL" -n "${inputs.num_videos:-20}" -o feed.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: feed.xml

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
